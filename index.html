<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WheelDex</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>WheelDex</h1>
<section class="stats">

<h2>Estatísticas</h2>

<div class="statsBox">

<div class="stat">
<h3 id="totalCarros">0</h3>
<p>Total de carros</p>
</div>

<div class="stat">
<h3 id="totalSeries">0</h3>
<p>Séries diferentes</p>
</div>

<div class="stat">
<h3 id="totalAnos">0</h3>
<p>Anos diferentes</p>
</div>

</div>

</section>
<p>Minha coleção de carros</p>
</header>

<main>

<section class="scanner">

<h2>Adicionar carro</h2>

<button class="scanBtn">📷 Tirar Foto</button>

<input 
type="file" 
id="fotoInput" 
accept="image/*" 
capture="environment"
style="display:none"
>

<div class="previewBox">
<img id="preview" alt="Preview da foto">
</div>

<button class="add">Guardar carro</button>

</section>

<section>

<h2>Minha coleção</h2>

<div class="container">

<!-- carros aparecem aqui -->

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
